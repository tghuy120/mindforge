name: Deploy Wiki Visualizer

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/deploy-wiki-visualizer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wiki/visualizer/package-lock.json

      - name: Install dependencies
        working-directory: wiki/visualizer
        run: npm ci

      - name: Copy graph data
        run: |
          rm -f wiki/visualizer/public/wiki-graph.json
          cp wiki/wiki-graph.json wiki/visualizer/public/wiki-graph.json

      - name: Build
        working-directory: wiki/visualizer
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/wiki
          cp -r wiki/visualizer/dist/* _site/wiki/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}wiki/
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
